<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Geist', system-ui, sans-serif; }
  a { color: #5b8def; text-decoration: none; }
  a:hover { color: #82a8f4; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; font-variant-numeric: tabular-nums; }
</style>
</helmet>

<div style="position:relative;width:392px;height:844px;border-radius:48px;background:#0a0b0d;border:11px solid #2b2d31;box-shadow:0 40px 90px rgba(0,0,0,0.55);overflow:hidden;display:flex;flex-direction:column;font-family:'Geist',system-ui,sans-serif;color:#f2f4f7;">

  <!-- MAP region -->
  <div style="position:relative;height:452px;flex:none;">
    <svg viewBox="0 0 393 452" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%;">
      <rect x="0" y="0" width="393" height="452" fill="#0a0b0d"></rect>
      <rect x="-20" y="60" width="150" height="120" rx="10" fill="#0e1014"></rect>
      <rect x="250" y="230" width="180" height="160" rx="10" fill="#0e1014"></rect>
      <g stroke="#15171b" stroke-width="7" stroke-linecap="round">
        <path d="M -20 150 L 420 150"></path><path d="M -20 300 L 420 300"></path>
        <path d="M 110 -20 L 110 480"></path><path d="M 280 -20 L 280 480"></path>
      </g>
    </svg>

    <!-- geofence circle + pin (centered) -->
    <div style="position:absolute;left:50%;top:226px;transform:translate(-50%,-50%);width:188px;height:188px;border-radius:50%;background:rgba(91,141,239,0.14);border:1.5px solid rgba(91,141,239,0.55);"></div>
    <div style="position:absolute;left:50%;top:226px;transform:translate(-50%,-100%);display:flex;flex-direction:column;align-items:center;">
      <svg width="40" height="48" viewBox="0 0 40 48"><path d="M20 47 C33 30 38 24 38 16 A18 18 0 0 0 2 16 C2 24 7 30 20 47 Z" fill="#5b8def" stroke="#0a0b0d" stroke-width="1.5"></path><circle cx="20" cy="16" r="6.5" fill="#0a0b0d"></circle></svg>
    </div>
    <div style="position:absolute;left:50%;top:226px;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:rgba(91,141,239,0.6);"></div>

    <!-- status bar overlay -->
    <div style="position:absolute;top:0;left:0;right:0;height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:5;">
      <span class="mono" style="font-size:14px;font-weight:500;color:#e8eaed;">9:41</span>
      <div style="display:flex;align-items:center;gap:7px;color:#e8eaed;">
        <span style="font-size:11px;font-weight:600;letter-spacing:0.5px;">5G</span>
        <svg width="16" height="12" viewBox="0 0 16 12"><g fill="#e8eaed"><rect x="0" y="8" width="3" height="4" rx="1"></rect><rect x="4.3" y="5.5" width="3" height="6.5" rx="1"></rect><rect x="8.6" y="3" width="3" height="9" rx="1"></rect><rect x="12.9" y="0.5" width="3" height="11.5" rx="1" opacity="0.35"></rect></g></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 11.2 L1 4.2 a9.9 9.9 0 0 1 14 0 Z" fill="#e8eaed"></path></svg>
        <svg width="24" height="12" viewBox="0 0 24 12"><rect x="0.5" y="0.5" width="20" height="11" rx="3" fill="none" stroke="#e8eaed" stroke-opacity="0.5"></rect><rect x="2.5" y="2.5" width="13" height="7" rx="1.5" fill="#e8eaed"></rect><rect x="21.5" y="4" width="1.6" height="4" rx="0.8" fill="#e8eaed" opacity="0.6"></rect></svg>
      </div>
    </div>

    <!-- back + search -->
    <div style="position:absolute;top:56px;left:16px;right:16px;display:flex;align-items:center;gap:10px;z-index:5;">
      <div style="width:44px;height:44px;border-radius:14px;flex:none;background:rgba(15,17,21,0.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.09);display:flex;align-items:center;justify-content:center;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e8eaed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5 L8 12 L15 19"></path></svg>
      </div>
      <div style="flex:1;height:44px;display:flex;align-items:center;gap:10px;padding:0 14px;border-radius:14px;background:rgba(15,17,21,0.78);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.09);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8a9099" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="M20 20 L16 16"></path></svg>
        <span style="font-size:15px;color:#e8eaed;">45 Riverside Drive</span>
      </div>
    </div>

    <!-- current location pill -->
    <div style="position:absolute;bottom:36px;left:16px;z-index:5;display:inline-flex;align-items:center;gap:8px;height:40px;padding:0 15px;border-radius:20px;background:rgba(15,17,21,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.09);">
      <svg width="18" height="18" viewBox="0 0 20 20"><circle cx="10" cy="10" r="4.5" fill="none" stroke="#5b8def" stroke-width="1.6"></circle><circle cx="10" cy="10" r="1.4" fill="#5b8def"></circle><g stroke="#5b8def" stroke-width="1.6" stroke-linecap="round"><path d="M10 1.5 L10 4"></path><path d="M10 16 L10 18.5"></path><path d="M1.5 10 L4 10"></path><path d="M16 10 L18.5 10"></path></g></svg>
      <span style="font-size:13px;font-weight:500;color:#e8eaed;">Use my location</span>
    </div>
  </div>

  <!-- bottom sheet -->
  <div style="flex:1;margin-top:-22px;border-radius:26px 26px 0 0;background:#101216;border-top:1px solid rgba(255,255,255,0.08);box-shadow:0 -14px 40px rgba(0,0,0,0.5);padding:10px 20px 0;display:flex;flex-direction:column;position:relative;z-index:6;">
    <div style="width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,0.18);margin:0 auto 16px;"></div>

    <div style="font-size:12px;font-weight:600;color:#8a9099;margin-bottom:7px;letter-spacing:0.2px;">PLACE NAME</div>
    <div style="height:50px;display:flex;align-items:center;padding:0 16px;border-radius:14px;background:#16181c;border:1.5px solid rgba(255,255,255,0.08);font-size:16px;color:#f2f4f7;margin-bottom:18px;">Home</div>

    <div style="font-size:12px;font-weight:600;color:#8a9099;margin-bottom:9px;letter-spacing:0.2px;">ICON</div>
    <div style="display:flex;gap:9px;margin-bottom:20px;">
      <div style="width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:rgba(91,141,239,0.16);border:1.5px solid #5b8def;">🏠</div>
      <div style="width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#16181c;border:1px solid rgba(255,255,255,0.07);">🏢</div>
      <div style="width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#16181c;border:1px solid rgba(255,255,255,0.07);">⭐</div>
      <div style="width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#16181c;border:1px solid rgba(255,255,255,0.07);">🅿️</div>
      <div style="width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#16181c;border:1px solid rgba(255,255,255,0.07);">🍽️</div>
      <div style="width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;background:#16181c;border:1px solid rgba(255,255,255,0.07);color:#8a9099;">＋</div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;">
      <span style="font-size:12px;font-weight:600;color:#8a9099;letter-spacing:0.2px;">GEOFENCE RADIUS</span>
      <span class="mono" style="font-size:14px;font-weight:600;color:#f2f4f7;">150 m</span>
    </div>
    <div style="position:relative;height:5px;border-radius:3px;background:rgba(255,255,255,0.12);margin:8px 0 24px;">
      <div style="position:absolute;left:0;top:0;bottom:0;width:42%;border-radius:3px;background:#5b8def;"></div>
      <div style="position:absolute;left:42%;top:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.5);"></div>
    </div>

    <button style="width:100%;height:54px;border:none;border-radius:16px;background:#5b8def;color:#fff;font-family:'Geist',sans-serif;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 12px 28px rgba(91,141,239,0.3);">Save place</button>
  </div>

  <!-- nav pill -->
  <div style="height:24px;display:flex;align-items:center;justify-content:center;flex:none;background:#101216;position:relative;z-index:6;"><div style="width:120px;height:5px;border-radius:3px;background:#e8eaed;opacity:0.5;"></div></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 414, &quot;height&quot;: 866 } }"></script>
</body>
</html>
